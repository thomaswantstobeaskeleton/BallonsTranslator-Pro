name: Feature Request
title: "Feature Request:"
description: Propose new features or optimizations for BallonsTranslator Pro
labels: [feature]
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Begin

        🚨 **Please follow these steps** 🚨

        1. Ensure your repository is up-to-date: `git pull` (or `.\git\bin\git.exe pull` / `.\PortableGit\bin\git.exe pull` on Windows)
        2. Check if a similar feature request already exists.

        **This is the BallonsTranslator Pro fork.** Feature ideas for the original BallonsTranslator should be reported upstream.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Version Info
      description: |
        Copy from the console output when the app starts (if missing, save project and restart):
        - Python version and interpreter path
        - Application version, branch, Commit hash
      placeholder: |
        Example:
        Python version: 3.10.11 (...)
        Python executable: C:\...\python.exe
        Version: 1.5.0
        Branch: main
        Commit hash: 9a0e75f...
  - type: dropdown
    validations:
      required: true
    attributes:
      label: Type of Request
      options:
        - New Feature
        - Feature Optimization
  - type: dropdown
    attributes:
      label: Area (optional)
      description: Which part of BallonsTranslator Pro does this relate to?
      options:
        - Not specified
        - Text detection (incl. dual detection)
        - OCR
        - Inpainting
        - Translation (incl. LLM API, context, glossary)
        - Translation context / glossary / batch queue
        - UI / Config panel
        - Text eraser / drawing tools
        - Canvas / text edit panel
        - Manga source / download
        - Keyboard shortcuts / workflow
        - Other
  - type: textarea
    validations:
      required: true
    attributes:
      label: Description
      description: |
        Please describe the feature or improvement you would like to see.
  - type: textarea
    attributes:
      label: Pictures
      description: |
        If possible, attach relevant examples or UI screenshots (drag and drop image).
  - type: textarea
    attributes:
      label: Additional Information
      description: |
        Any other context (use case, alternatives considered, etc.).
