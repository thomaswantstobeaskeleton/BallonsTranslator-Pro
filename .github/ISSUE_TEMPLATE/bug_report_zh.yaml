name: Bug 反馈
title: "Bug 反馈:"
description: 报告 BallonsTranslator Pro 中的错误
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 在开始之前

        🚨 **请务必按以下步骤操作** 🚨

        1. 请确保在创建问题前更新仓库：`git pull`（Windows 可用 `.\git\bin\git.exe pull` 或 `.\PortableGit\bin\git.exe pull`）
        2. 检查是否已有类似问题存在。
        3. 请尽可能提供详细信息，包括崩溃日志（如有）。

        **本仓库为 BallonsTranslator Pro 分支。** 若问题属于原版 BallonsTranslator，请向上游反馈。
  - type: textarea
    validations:
      required: true
    attributes:
      label: 版本信息
      description: |
        请从程序启动时控制台输出中复制以下内容（若未显示，请保存项目后重启）：
        - Python 版本及解释器路径
        - 应用版本、分支、Commit hash
      placeholder: |
        示例:
        Python version: 3.10.11 (...)
        Python executable: C:\...\python.exe
        Version: 1.5.0
        Branch: main
        Commit hash: 9a0e75f...
  - type: textarea
    validations:
      required: true
    attributes:
      label: 问题描述
      description: |
        请详细描述问题，并提供复现步骤。
  - type: markdown
    attributes:
      value: |
        ### 受影响的模块（BallonsTranslator Pro）
        若问题与特定模块相关，请选择对应项；否则请选「不适用」。
  - type: dropdown
    attributes:
      label: 文本检测
      options:
        - 不适用
        - ctd
        - craft_det
        - dptext_detr
        - easyocr_det
        - hf_object_det
        - hunyuan_ocr_det
