name: Bug Report
title: "Bug Report:"
description: Report a bug in BallonsTranslator Pro
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Begin

        🚨 **Please follow these steps before creating an issue** 🚨

        1. Ensure your repository is up-to-date:
           - `git pull` (or `.\git\bin\git.exe pull` / `.\PortableGit\bin\git.exe pull` on Windows)
        2. Check if a similar issue already exists.
        3. Provide as much detail as possible, including crash logs (if applicable).

        **This is the BallonsTranslator Pro fork.** If your issue is about the original BallonsTranslator, please report it upstream.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Version Info
      description: |
        Copy from the console output when the app starts (if missing, save project and restart):
        - Python version and interpreter path
        - Application version, branch, Commit hash
      placeholder: |
        Example:
        Python version: 3.10.11 (...)
        Python executable: C:\...\python.exe
        Version: 1.5.0
        Branch: main
        Commit hash: 9a0e75f...
  - type: textarea
    validations:
      required: true
    attributes:
      label: Description of the Problem
      description: |
        Describe the bug in detail and provide steps to reproduce.
  - type: markdown
    attributes:
      value: |
        ### Affected Modules (BallonsTranslator Pro)
        If the issue is related to specific modules, select each that applies. Otherwise choose "Not applicable".
  - type: dropdown
    attributes:
      label: Text Detector
